buildscript {
  repositories {
    mavenCentral()
  }
  dependencies {
    classpath("org.jetbrains.kotlin.plugin.compose:org.jetbrains.kotlin.plugin.compose.gradle.plugin:${kotlinVersion}")
  }
}

plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

group = 'expo.modules.testexpoui'
version = '1.0.0'

expoModule {
  canBePublished false
}

android {
  namespace "expo.modules.testexpoui"
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
  buildFeatures {
    compose true
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation project(':expo-ui')
  implementation 'androidx.compose.foundation:foundation-android:1.10.2'
  implementation 'androidx.compose.ui:ui-android:1.10.2'
  implementation "androidx.compose.material3:material3-android:1.5.0-alpha13"
}
